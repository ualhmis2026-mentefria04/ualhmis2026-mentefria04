<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>Formulario de Contacto</h2>
    <p>¿Tienes alguna duda sobre nuestro proyecto? Envíanos un mensaje y te responderemos lo antes posible.</p>

    <form action="https://formspree.io/f/xlgpndgo" method="POST" style="background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eaeaea;">
        
        <div style="margin-bottom: 15px;">
            <label for="full-name" style="display: block; font-weight: 600; margin-bottom: 8px; color: #333;">Nombre Completo</label>
            <input type="text" name="name" id="full-name" placeholder="Ej: Ada Lovelace" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="email-address" style="display: block; font-weight: 600; margin-bottom: 8px; color: #333;">Correo Electrónico</label>
            <input type="email" name="_replyto" id="email-address" placeholder="tu@email.com" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="subject" style="display: block; font-weight: 600; margin-bottom: 8px; color: #333;">Asunto</label>
            <input type="text" name="subject" id="subject" placeholder="Consulta sobre Azure o Jekyll" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="message" style="display: block; font-weight: 600; margin-bottom: 8px; color: #333;">Mensaje</label>
            <textarea rows="5" name="message" id="message" placeholder="Escribe aquí tu mensaje..." required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; resize: vertical;"></textarea>
        </div>

        <button type="submit" style="background-color: #155799; color: white; padding: 12px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;">
            Enviar Mensaje
        </button>

    </form>
</div>
