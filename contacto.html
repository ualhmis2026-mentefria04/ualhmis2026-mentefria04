<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1>📩 Formulario de Contacto</h1>
    <p>¿Tienes alguna duda sobre nuestro proyecto? Envíanos un mensaje y te responderemos lo antes posible.</p>

    <form action="https://formspree.io/f/TU_ID_AQUI" method="POST" style="background: #f9f9f9; padding: 30px; border-radius: 10px; border: 1px solid #ddd;">
        
        <div style="margin-bottom: 15px;">
            <label for="full-name" style="display: block; font-weight: bold; margin-bottom: 5px;">Nombre Completo</label>
            <input type="text" name="name" id="full-name" placeholder="Ej: Marcos Escánez" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="email-address" style="display: block; font-weight: bold; margin-bottom: 5px;">Correo Electrónico</label>
            <input type="email" name="_replyto" id="email-address" placeholder="tu@email.com" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="subject" style="display: block; font-weight: bold; margin-bottom: 5px;">Asunto</label>
            <input type="text" name="subject" id="subject" placeholder="Consulta sobre Azure / Jekyll" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="message" style="display: block; font-weight: bold; margin-bottom: 5px;">Mensaje</label>
            <textarea rows="5" name="message" id="message" placeholder="Escribe aquí tu mensaje..." required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: sans-serif;"></textarea>
        </div>

        <button type="submit" style="background-color: #3a7bd5; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%;">
            Enviar Mensaje
        </button>

    </form>
</div>
